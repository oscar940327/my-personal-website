<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">VideoNote workflow</title>
  <desc id="desc">A minimal interface showing a video transformed into an editable Markdown note and knowledge garden.</desc>
  <rect width="1200" height="760" rx="28" fill="#f3f1ec"/>
  <rect x="44" y="44" width="1112" height="672" rx="20" fill="#fbfaf7" stroke="#242321" stroke-width="2"/>
  <circle cx="82" cy="82" r="7" fill="#242321"/>
  <circle cx="108" cy="82" r="7" fill="#aaa6a0"/>
  <circle cx="134" cy="82" r="7" fill="#d1cec8"/>
  <text x="78" y="170" fill="#242321" font-family="Arial, sans-serif" font-size="28" letter-spacing="5">VIDEO TO KNOWLEDGE</text>
  <text x="78" y="235" fill="#242321" font-family="Arial, sans-serif" font-size="66" font-weight="600">VideoNote</text>
  <rect x="78" y="294" width="1044" height="78" rx="10" fill="#242321"/>
  <text x="108" y="344" fill="#fbfaf7" font-family="monospace" font-size="22">youtube.com/watch?v=...  →  Generate note</text>
  <rect x="78" y="414" width="494" height="236" rx="12" fill="#ebe8e1" stroke="#242321" stroke-width="2"/>
  <text x="108" y="458" fill="#77736c" font-family="monospace" font-size="17">MARKDOWN EDITOR</text>
  <text x="108" y="510" fill="#242321" font-family="monospace" font-size="25"># Agent Architecture</text>
  <text x="108" y="554" fill="#242321" font-family="monospace" font-size="19">## Plan and Execute</text>
  <line x1="108" y1="588" x2="500" y2="588" stroke="#aaa6a0" stroke-width="8" stroke-linecap="round"/>
  <line x1="108" y1="618" x2="438" y2="618" stroke="#c7c3bc" stroke-width="8" stroke-linecap="round"/>
  <rect x="628" y="414" width="494" height="236" rx="12" fill="#242321"/>
  <text x="658" y="458" fill="#aaa6a0" font-family="monospace" font-size="17">KNOWLEDGE GARDEN</text>
  <circle cx="716" cy="548" r="25" fill="#fbfaf7"/>
  <circle cx="864" cy="502" r="19" fill="#d1cec8"/>
  <circle cx="1006" cy="574" r="22" fill="#fbfaf7"/>
  <line x1="738" y1="540" x2="846" y2="508" stroke="#fbfaf7" stroke-width="3"/>
  <line x1="882" y1="511" x2="987" y2="564" stroke="#fbfaf7" stroke-width="3"/>
  <line x1="738" y1="557" x2="985" y2="576" stroke="#77736c" stroke-width="2"/>
  <text x="682" y="608" fill="#aaa6a0" font-family="monospace" font-size="16">OBSIDIAN</text>
  <text x="960" y="618" fill="#aaa6a0" font-family="monospace" font-size="16">QUARTZ</text>
</svg>
